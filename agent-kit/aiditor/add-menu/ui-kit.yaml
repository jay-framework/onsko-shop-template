items:
  - id: ui-kit:popover-menu
    title: Popover menu
    category: UI Kit
    subCategory: Components
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract popover-menu.
      Read agent-kit/designer/popover-menu.md for import, refs (trigger, popover), and CSS.
      Hover-triggered dropdown; for click-triggered popups use click-popover.md (pure HTML).

  - id: ui-kit:scroll-carousel
    title: Scroll carousel
    category: UI Kit
    subCategory: Components
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract scroll-carousel.
      Read agent-kit/designer/scroll-carousel.md for import, refs (container, prev, next), and ViewState (atStart, atEnd).

  - id: ui-kit:clipboard-copy
    title: Clipboard copy
    category: UI Kit
    subCategory: Components
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract clipboard-copy.
      Read agent-kit/designer/clipboard-copy.md for import, copyBtn ref, text prop, and copied ViewState.

  - id: ui-kit:word-split
    title: Word split
    category: UI Kit
    subCategory: Typography
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract word-split.
      Read agent-kit/designer/word-split.md for import, text prop, words loop, and accessibility (aria-label).

  - id: ui-kit:letter-split
    title: Letter split
    category: UI Kit
    subCategory: Typography
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Use headless component @jay-framework/ui-kit / contract letter-split.
      Read agent-kit/designer/letter-split.md for import, text prop, letters loop, and accessibility (aria-label).

  - id: ui-kit:spring-button-hover
    title: Spring button hover
    category: UI Kit
    subCategory: Animation
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Apply the CSS spring hover effect for buttons on this page.
      Read agent-kit/aiditor/skills/ui-kit/spring-button-hover.md for class names (.ui-kit-spring-hover),
      the linear() transition curve, reduced-motion fallback, and jay-html usage.
      Implement only on buttons (or button-like controls) the user indicated in this request.
      Add the shared CSS once per page; add the class to each targeted control in page.jay-html.

  - id: ui-kit:sticky-header-scroll
    title: Sticky header (scroll morph)
    category: UI Kit
    subCategory: Animation
    pluginName: ui-kit
    packageName: '@jay-framework/ui-kit'
    prompt: |
      Apply the scroll-driven sticky header effect on this page.
      Read agent-kit/aiditor/skills/ui-kit/sticky-header-scroll.md for class .ui-kit-sticky-header,
      scroll-linked padding + clip-path shape() morph, fallbacks, and jay-html usage.
      Implement only on the page header/nav the user indicated in this request.
      Add the shared CSS once per page; add the class to the targeted header element in page.jay-html.
