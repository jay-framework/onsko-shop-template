plugins:
  - name: wix-cart
    path: ./node_modules/@jay-framework/wix-cart
    contracts:
      - name: cart-indicator
        description: Lightweight cart indicator for site headers showing item count
        type: static
        path: ./node_modules/@jay-framework/wix-cart/dist/contracts/cart-indicator.jay-contract
      - name: cart-page
        description: Full cart page with line item management and checkout
        type: static
        path: ./node_modules/@jay-framework/wix-cart/dist/contracts/cart-page.jay-contract
      - name: mini-cart
        description: Drawer that auto-opens when a product is added to cart
        type: static
        path: ./node_modules/@jay-framework/wix-cart/dist/contracts/mini-cart.jay-contract
    services:
      - name: wix-cart
        marker: WIX_CART_SERVICE
        description: Wix eCommerce cart API for server-side cart operations
    contexts:
      - name: wix-cart
        marker: WIX_CART_CONTEXT
        description: Client-side reactive cart state with add-to-cart, remove, quantity,
          coupon, and checkout operations
  - name: wix-deploy
    path: ./node_modules/@jay-framework/wix-deploy
    contracts: []
    commands:
      - name: deploy
      - name: build-entry
      - name: upload-backend
      - name: deploy-baas
  - name: wix-server-client
    path: ./node_modules/@jay-framework/wix-server-client
    contracts: []
    services:
      - name: wix-client
        marker: WIX_CLIENT_SERVICE
        description: Core Wix SDK client with API key authentication
    contexts:
      - name: wix-client
        marker: WIX_CLIENT_CONTEXT
        description: Client-side OAuth authentication and token management
  - name: wix-stores
    path: ./node_modules/@jay-framework/wix-stores
    contracts:
      - name: product-search
        description: Headless product search page
        type: static
        path: ./node_modules/@jay-framework/wix-stores/dist/contracts/product-search.jay-contract
      - name: related-products
        description: Related products from the same category
        type: static
        path: ./node_modules/@jay-framework/wix-stores/dist/contracts/related-products.jay-contract
      - name: category-list
        description: Category list listing the categories
        type: static
        path: ./node_modules/@jay-framework/wix-stores/dist/contracts/category-list.jay-contract
      - name: product-page
        description: Full product detail page with variants, options, media gallery, and
          add-to-cart. Use for individual product pages.
        type: dynamic
        path: ./agent-kit/materialized-contracts/wix-stores/product-page.jay-contract
        metadata:
          extendedFieldCount: 0
    actions:
      - name: searchProducts
        description: Search products in the Wix Store catalog using Catalog V3. Supports
          text search, price/stock/category filtering, sorting, and cursor-based
          pagination. Returns matching products with price aggregation data.
        path: ./node_modules/@jay-framework/wix-stores/dist/actions/search-products.jay-action
      - name: getProductBySlug
        description: Get a single product by its URL slug. Returns full
          ProductCardViewState or null if not found.
        path: ./node_modules/@jay-framework/wix-stores/dist/actions/get-product-by-slug.jay-action
      - name: getCategories
        description: Get available store categories for filtering products. Returns
          category IDs and names.
        path: ./node_modules/@jay-framework/wix-stores/dist/actions/get-categories.jay-action
      - name: getVariantStock
        description: Get variant stock availability for a product with color + text
          options. Returns a map of colorChoiceId -> textChoiceId -> inStock.
        path: ./node_modules/@jay-framework/wix-stores/dist/actions/get-variant-stock.jay-action
    services:
      - name: wix-stores
        marker: WIX_STORES_SERVICE_MARKER
        description: Wix Stores Catalog V3 API (products, categories, inventory,
          customizations) with lazy-loaded caching
    contexts:
      - name: wix-stores
        marker: WIX_STORES_CONTEXT
        description: Client-side stores access with product variant resolution and
          delegated cart operations
  - name: aiditor
    path: ./node_modules/@jay-framework/aiditor
    contracts:
      - name: aiditor-shell
        description: AIditor shell — editor chrome banner
        type: static
        path: ./node_modules/@jay-framework/aiditor/dist/aiditor-shell.jay-contract
    actions:
      - name: getAiditorBootstrap
        description: One-shot bootstrap returning project directory and dev server base URL
        path: ./node_modules/@jay-framework/aiditor/dist/actions/get-aiditor-bootstrap.jay-action
      - name: getProjectInfoAction
        description: List all page routes in the project via dev server
        path: ./node_modules/@jay-framework/aiditor/dist/actions/get-project-info.jay-action
      - name: getPageParamsAction
        description: Stream dynamic route parameter combinations from dev server
        path: ./node_modules/@jay-framework/aiditor/dist/actions/get-page-params.jay-action
      - name: listFreezesAction
        description: List frozen page states for a given route
        path: ./node_modules/@jay-framework/aiditor/dist/actions/list-freezes.jay-action
      - name: submitTaskAction
        description: Submit a visual annotation task to the AI agent (Agent SDK) with
          file uploads
        path: ./node_modules/@jay-framework/aiditor/dist/actions/submit-task.jay-action
      - name: readFileAction
        description: Read a file from the project filesystem (text or image as base64)
        path: ./node_modules/@jay-framework/aiditor/dist/actions/read-file.jay-action
      - name: checkAddPageRouteAction
        description: Validate and normalize an Add Page route; check if it already exists
        path: ./node_modules/@jay-framework/aiditor/dist/actions/check-add-page-route.jay-action
      - name: startAddPageRequestAction
        description: Mint an Add Page request folder under .aiditor/page-requests/
        path: ./node_modules/@jay-framework/aiditor/dist/actions/start-add-page-request.jay-action
      - name: saveAddPageDraftAction
        description: Persist Add Page composer markdown to the request folder
        path: ./node_modules/@jay-framework/aiditor/dist/actions/save-add-page-draft.jay-action
      - name: uploadAddPageAssetAction
        description: Upload a reference or asset file for an Add Page request
        path: ./node_modules/@jay-framework/aiditor/dist/actions/upload-add-page-asset.jay-action
      - name: reclassifyAddPageAssetAction
        description: Move an attachment between references/ and assets/ for an Add Page
          request
        path: ./node_modules/@jay-framework/aiditor/dist/actions/reclassify-add-page-asset.jay-action
      - name: submitAddPageAction
        description: Run the Add Page implementation agent and validate the result
          (streaming)
        path: ./node_modules/@jay-framework/aiditor/dist/actions/submit-add-page.jay-action
      - name: checkPageAddPageBriefAction
        description: Check whether a Jay page has saved Add Page brief files next to its
          jay-html
        path: ./node_modules/@jay-framework/aiditor/dist/actions/check-page-add-page-brief.jay-action
      - name: openAddPageFromBriefAction
        description: Load a page's saved Add Page brief into a new page request with a
          unique copy route
        path: ./node_modules/@jay-framework/aiditor/dist/actions/open-add-page-from-brief.jay-action
      - name: generateAddPageBriefFromImageAction
        description: Generate Add Page Content or Design markdown from screenshot(s) via
          vision AI
        path: ./node_modules/@jay-framework/aiditor/dist/actions/generate-add-page-brief-from-image.jay-action
      - name: checkPluginUpdateAction
        description: Compare installed plugin version with latest on npm
        path: ./node_modules/@jay-framework/aiditor/dist/actions/check-plugin-update.jay-action
      - name: listJayPluginsAction
        description: List Jay plugin catalog with install and setup status
        path: ./node_modules/@jay-framework/aiditor/dist/actions/list-jay-plugins.jay-action
      - name: listPluginContractsAction
        description: List contracts for an installed plugin
        path: ./node_modules/@jay-framework/aiditor/dist/actions/list-plugin-contracts.jay-action
      - name: ensureProjectPluginAction
        description: Install plugin package, run setup and agent-kit (stream)
        path: ./node_modules/@jay-framework/aiditor/dist/actions/ensure-project-plugin.jay-action
      - name: getPluginSetupStatusAction
        description: Query plugin setup status from cache or refresh
        path: ./node_modules/@jay-framework/aiditor/dist/actions/get-plugin-setup-status.jay-action
      - name: rerunPluginSetupAction
        description: Re-run jay-stack setup for a plugin
        path: ./node_modules/@jay-framework/aiditor/dist/actions/rerun-plugin-setup.jay-action
      - name: syncAddPagePluginManifestAction
        description: Sync selected plugins to content.md managed section and request.json
        path: ./node_modules/@jay-framework/aiditor/dist/actions/sync-add-page-plugin-manifest.jay-action
      - name: listAddMenuItemsAction
        description: List Add Menu catalog items from agent-kit/aiditor/add-menu/
        path: ./node_modules/@jay-framework/aiditor/dist/actions/list-add-menu-items.jay-action
      - name: syncAddMenuAttachmentsAction
        description: Persist Add Menu attachments to request.json (content.md unchanged
          unless contentMd is passed)
        path: ./node_modules/@jay-framework/aiditor/dist/actions/sync-add-menu-attachments.jay-action
      - name: resolveAddMenuContractParamsAction
        description: Resolve URL params from a materialized contract for Add Menu Q8 helpers
        path: ./node_modules/@jay-framework/aiditor/dist/actions/resolve-add-menu-contract-params.jay-action
      - name: writePluginSourceAction
        description: Add or update a local plugin source in .aiditor/plugin-sources.yaml
        path: ./node_modules/@jay-framework/aiditor/dist/actions/write-plugin-source.jay-action
    routes:
      - path: /aiditor
        description: AIditor — visual AI-driven code editor
  - name: wix-media
    path: ./node_modules/@jay-framework/wix-media
    contracts: []
    commands:
      - name: upload-public
      - name: rebuild-index
  - name: a11y-validator
    path: ./node_modules/@jay-framework/a11y-validator
    contracts: []
  - name: seo-validator
    path: ./node_modules/@jay-framework/seo-validator
    contracts: []
